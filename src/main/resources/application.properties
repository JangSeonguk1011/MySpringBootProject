spring.application.name=MySpringBoot

# port number
server.port=8080

# 실습 요구사항 (이 부분이 없어서 에러가 났습니다!)
myprop.username=springboot
myprop.port=${random.int(1,100)}

# 사용자 정의 환경 변수
myboot.age=${random.int(1,100)}
# 아래 줄도 myboot.name이 정의되어 있어야 에러가 안 납니다.
# myboot.fullName=${myboot.name} Boot

# 현재 활성화된 Profile 값 설정
spring.profiles.active=prod